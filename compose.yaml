services:
  postgres:
    image: postgres:18.4-alpine
    container_name: metamorph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metamorph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metamorph}
      POSTGRES_DB: ${POSTGRES_DB:-metamorph}
    ports:
      - "5432:5432"
    volumes:
      # PG 18+: mount parent dir; data lives in /var/lib/postgresql/<major>/docker
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-metamorph} -d ${POSTGRES_DB:-metamorph}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    container_name: metamorph-rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: metamorph-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init: # Crea el bucket (MINIO_BUCKET)
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: metamorph-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-metamorph-artifacts}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb local/$$MINIO_BUCKET --ignore-existing &&
      echo Bucket $$MINIO_BUCKET ready
      "
    restart: "no"

  # Phase 2 discover worker — long-running RabbitMQ consumer
  worker-playwright:
    build:
      context: .
      dockerfile: apps/worker-playwright/Dockerfile
    container_name: metamorph-worker-playwright
    init: true
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_LOCALE: ${PLAYWRIGHT_LOCALE:-es-ES}
      MAX_CONCURRENT_BROWSERS: ${MAX_CONCURRENT_BROWSERS:-4}
      CI: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-metamorph}:${POSTGRES_PASSWORD:-metamorph}@postgres:5432/${POSTGRES_DB:-metamorph}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-metamorph-artifacts}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-metamorph.topic}
    command: ["consume"]
    shm_size: "2gb"

  worker-llm:
    build:
      context: .
      dockerfile: apps/worker-llm/Dockerfile
    container_name: metamorph-worker-llm
    init: true
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      WORKER_LLM_CONCURRENCY: ${WORKER_LLM_CONCURRENCY:-4}
      MAX_CONCURRENT_BROWSERS: ${MAX_CONCURRENT_BROWSERS:-4}
      DATABASE_URL: postgresql://${POSTGRES_USER:-metamorph}:${POSTGRES_PASSWORD:-metamorph}@postgres:5432/${POSTGRES_DB:-metamorph}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-metamorph-artifacts}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-metamorph.topic}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-120000}
      OPENROUTER_USE_JSON_SCHEMA: ${OPENROUTER_USE_JSON_SCHEMA:-false}
    command: ["consume"]

  # Standalone inventory capture to disk (dev only, no DB)
  # Usage: pnpm inventory:capture -- https://example.com
  inventory-capture:
    build:
      context: .
      dockerfile: packages/inventory/Dockerfile
    container_name: metamorph-inventory-capture
    profiles: ["workers"]
    init: true
    working_dir: /app
    environment:
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_LOCALE: ${PLAYWRIGHT_LOCALE:-es-ES}
      CI: "true"
      INVENTORY_OUT_DIR: /app/tmp/inventory
    volumes:
      - ./packages/inventory/tmp:/app/tmp/inventory
    shm_size: "1gb"

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
